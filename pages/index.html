<!DOCTYPE html>

<head>

  <title>Phantom – Home</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      min-height: 100%;
      background: #0a0a0a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #fff;
    }
    .screen {
      width: 100%;
      min-height: 100vh;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 10% 60px;
    }
    @media (min-width: 768px) {
      .screen { padding: 60px 25% 80px; }
    }
    @media (min-width: 1200px) {
      .screen { padding: 80px 32% 100px; }
    }
    .topbar {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .logo-row { display: flex; align-items: center; gap: 8px; }
    .logo-text { font-size: 20px; font-weight: 600; letter-spacing: -0.3px; }
    .more-btn {
      width: 38px; height: 38px; border-radius: 50%;
      background: #1e1e1e; border: none; color: #fff;
      font-size: 16px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; letter-spacing: 2px; padding-bottom: 2px;
    }
    .illustration {
      width: 100%;
      display: flex;
      justify-content: center;
      margin: 8px 0 18px;
    }
    .headline { color: #aaa; font-size: 13px; text-align: center; margin-bottom: 6px; }
    .main-title {
      color: #fff; font-size: 28px; font-weight: 700;
      text-align: center; line-height: 1.25; margin-bottom: 12px;
    }
    .legal {
      color: #666; font-size: 12px; text-align: center;
      line-height: 1.7; margin-bottom: 28px;
    }
    .legal a { color: #a78bfa; text-decoration: none; }
    .btn {
      width: 100%; padding: 16px;
      border-radius: 50px; font-size: 16px; font-weight: 600;
      display: flex; align-items: center; justify-content: center;
      gap: 10px; border: none; cursor: pointer;
      text-decoration: none; margin-bottom: 12px;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-purple { background: #a78bfa; color: #0a0a0a; }
    .btn-outline {
      background: transparent; color: #fff;
      border: 2px solid #3dfd9f;
    }
    .apple-icon { width: 20px; height: 20px; flex-shrink: 0; }
  </style>
</head>
