<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>phantom.com</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #e8e8ee;
      min-height: 100vh;
      display: flex; justify-content: center; align-items: center;
    }
    .phone {
      width: 375px; min-height: 812px;
      border-radius: 40px; border: 1px solid #ddd;
      overflow: hidden; display: flex; flex-direction: column;
      background: #f0f0f5;
    }
    .browser-top {
      background: #f0f0f5; padding: 16px 16px 10px;
      display: flex; align-items: center; gap: 10px;
    }
    .browser-pill { flex: 1; background: #ccc; border-radius: 20px; height: 28px; }
    .browser-cta {
      background: #4f8ef7; color: #fff; border: none;
      border-radius: 20px; padding: 6px 18px;
      font-size: 14px; font-weight: 600; cursor: pointer;
    }
    .close-btn {
      background: none; border: none;
      color: #888; font-size: 20px; cursor: pointer;
    }
    .site-nav {
      background: #f5f3ff; padding: 14px 20px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .ghost-logo { display: flex; align-items: center; gap: 6px; }
    .nav-right { display: flex; align-items: center; gap: 10px; }
    .dl-btn {
      background: #d8d0f8; color: #534AB7; border: none;
      border-radius: 20px; padding: 8px 18px;
      font-size: 14px; font-weight: 600; cursor: pointer;
    }
    .menu-btn {
      background: none; border: none;
      display: flex; flex-direction: column; gap: 4px; cursor: pointer; padding: 4px;
    }
    .menu-btn span { display: block; width: 20px; height: 2px; background: #333; border-radius: 2px; }
    .hero {
      background: #1a1a2e; margin: 0 12px;
      border-radius: 20px; padding: 48px 24px 36px;
      position: relative; overflow: hidden; flex: 1;
    }
    .hero-orb {
      position: absolute; border-radius: 50%; opacity: 0.7;
    }
    .hero-sub { color: #aaa; font-size: 14px; margin-bottom: 14px; position: relative; }
    .hero-title {
      color: #fff; font-size: 28px; font-weight: 700;
      line-height: 1.25; margin-bottom: 32px; position: relative;
    }
    .hero-dl-btn {
      background: #f0eeff; color: #2d2560; border: none;
      border-radius: 50px; padding: 16px 28px;
      font-size: 15px; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; gap: 10px;
      position: relative; transition: opacity 0.15s;
    }
    .hero-dl-btn:hover { opacity: 0.88; }
    .address-bar {
      background: #f0f0f5; padding: 12px 16px;
      display: flex; align-items: center; gap: 12px;
      border-top: 0.5px solid #ddd;
    }
    .addr-nav { background: none; border: none; color: #888; font-size: 18px; cursor: pointer; }
    .addr-input {
      flex: 1; background: #fff; border: 0.5px solid #ddd;
      border-radius: 10px; padding: 8px 12px;
      font-size: 13px; color: #555; text-align: center; outline: none;
    }
    .addr-more { background: none; border: none; color: #888; font-size: 20px; cursor: pointer; }
  </style>
</head>
<body>
<div class="phone">
  <div class="browser-top">
    <div class="browser-pill"></div>
    <button class="browser-cta">Open</button>
    <a href="index.html" class="close-btn">✕</a>
  </div>

  <div class="site-nav">
    <div class="ghost-logo">
      <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
        <path d="M16 3C10.477 3 6 7.477 6 13v13l4-3 4 3 4-3 4 3V13c0-5.523-4.477-10-10-10z" fill="#a78bfa"/>
        <circle cx="12" cy="13" r="2" fill="#fff"/>
        <circle cx="20" cy="13" r="2" fill="#fff"/>
      </svg>
    </div>
    <div class="nav-right">
      <button class="dl-btn">Download</button>
      <button class="menu-btn"><span></span><span></span><span></span></button>
    </div>
  </div>

  <div class="hero">
    <div class="hero-orb" style="width:60px;height:60px;background:#f59e0b;bottom:60px;left:20px;"></div>
    <div class="hero-orb" style="width:40px;height:40px;background:#3ecf8e;bottom:80px;right:60px;"></div>
    <div class="hero-orb" style="width:20px;height:20px;background:#a78bfa;top:40px;right:30px;"></div>

    <p class="hero-sub">The money app that'll take you places</p>
    <h1 class="hero-title">Your home for trading crypto, predictions, and more</h1>

    <button class="hero-dl-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="5" y="2" width="14" height="20" rx="2"/>
        <line x1="12" y1="8" x2="12" y2="16"/>
        <polyline points="8 12 12 16 16 12"/>
      </svg>
      Download Phantom
    </button>
  </div>

  <div class="address-bar">
    <button class="addr-nav">‹</button>
    <input class="addr-input" value="phantom.com" readonly />
    <button class="addr-nav">↻</button>
    <button class="addr-more">···</button>
  </div>
</div>
</body>
</html>
